name: Weekly SEO Check

on:
  schedule:
    - cron: "0 15 * * 1"   # Lunes 15:00 UTC (~10:00 MX)
  workflow_dispatch: {}
  # Sin trigger `push`: corría el check contra producción al instante del push,
  # antes de que terminara el deploy → falsos negativos (carrera con el deploy).
  # Solo schedule semanal + ejecución manual.

permissions:
  contents: read
  issues: write

jobs:
  seo_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep jq curl

      - name: Define URLs
        id: urls
        run: |
          echo 'URLS=/ /servicios/electricista-cerca-de-mi/ /servicios/emergencia-24-7/ /servicios/electricista-a-domicilio/ /servicios/electricista-precios/ /contacto/' >> $GITHUB_OUTPUT

      - name: Check sitemap HTTP 200
        run: |
          for s in https://electricistaculiacanpro.mx/sitemap.xml; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$s")
            echo "$s -> $code"
            [ "$code" = "200" ] || (echo "❌ Sitemap not 200: $s" && exit 1)
          done

      - name: Crawl pages (public) & run checks
        env:
          BASE: https://electricistaculiacanpro.mx
          # ${#var} cuenta CARACTERES solo con locale UTF-8; en locale C contaría
          # bytes y los títulos con acentos (í/á/ó) darían 2-3 de más → falso
          # positivo de longitud. Se fija explícito para no depender del runner.
          LC_ALL: C.UTF-8
        run: |
          FAIL=0
          urls='${{ steps.urls.outputs.URLS }}'
          for u in $urls; do
            echo "== $u"
            # -L: defensa ante un 301 futuro (como la consolidación de /precios/
            # en el sitio hermano, que dejó su check fallando 3 semanas).
            html="$(curl -sSL "$BASE$u")" || FAIL=1

            # 1) GTM: exactamente 1 gtm.js y 1 ns.html. FALLA duro: el 2026-07-06
            # se encontraron 18 páginas cargando GTM DOBLE (bloque lazy viejo +
            # moderno) → métricas infladas ~2x; ya limpiadas. Si reaparece hay
            # que enterarse por Issue, no con un ⚠️ que nadie lee.
            js=$(printf "%s" "$html" | rg -c 'googletagmanager\.com/gtm\.js\?id=' || echo 0)
            ns=$(printf "%s" "$html" | rg -c 'googletagmanager\.com/ns\.html\?id=' || echo 0)
            echo "GTM gtm.js:$js ns.html:$ns"
            [ "$js" -eq 1 ] && [ "$ns" -eq 1 ] || { echo "❌ GTM count mismatch in $u (expected 1 each)"; FAIL=1; }

            # 2) Title length 50–66 unificado (~66 chars ≈ 600px, límite práctico
            # de Google; mismo criterio que el sitio del plomero). El rango
            # anterior (50–60 servicios) marcaba como error títulos legítimos
            # de 61-66 (p.ej. cerca-de-mi con 65).
            # Los rg de extracción/conteo llevan guard (|| true / || echo 0):
            # rg sale con código 1 al no encontrar nada y el shell de Actions
            # corre con set -eo pipefail → sin guard el script muere sin
            # imprimir qué check falló ni auditar las URLs restantes.
            title=$(printf "%s" "$html" | rg -o '<title>.*?</title>' -N | sed -E 's|</?title>||g' || true)
            tlen=${#title}
            echo "Title($tlen): $title"
            [ $tlen -ge 50 ] && [ $tlen -le 66 ] || { echo "❌ Title length out of range in $u ($tlen)"; FAIL=1; }

            # 3) Meta description 120–155
            desc=$(printf "%s" "$html" | rg -o '<meta name="description" content="[^"]*"' -N | sed -E 's/.*content="(.*)"/\1/' || true)
            dlen=${#desc}
            echo "Desc($dlen): ${desc:0:80}..."
            [ $dlen -ge 120 ] && [ $dlen -le 155 ] || { echo "❌ Description length out of range in $u ($dlen)"; FAIL=1; }

            # 4) Canonical & og:url al dominio correcto
            can=$(printf "%s" "$html" | rg -c '<link[^>]+rel="canonical"[^>]+https://electricistaculiacanpro.mx' -i || echo 0)
            ogu=$(printf "%s" "$html" | rg -c 'property="og:url"[^>]+https://electricistaculiacanpro.mx' -i || echo 0)
            echo "Canonical:$can og:url:$ogu"
            [ "$can" -ge 1 ] || { echo "❌ Missing canonical in $u"; FAIL=1; }
            [ "$ogu" -ge 1 ] || { echo "❌ Missing og:url in $u"; FAIL=1; }

            # 5) JSON-LD: 1 bloque en cada página y @graph en Home+Servicios; Contacto puede no tener @graph
            blocks=$(printf "%s" "$html" | rg -c '<script type="application/ld\+json">' || echo 0)
            echo "JSON-LD blocks: $blocks"
            [ "$blocks" -ge 1 ] || { echo "❌ No JSON-LD in $u"; FAIL=1; }

            json=$(printf "%s" "$html" | rg -oP '(?s)(?<=<script type="application/ld\+json">).*(?=</script>)' | head -n1 || true)
            if [ -n "$json" ]; then
              echo "$json" | jq -e . >/dev/null || { echo "❌ Invalid JSON-LD in $u"; FAIL=1; }
              if [ "$u" = "/" ] || printf "%s" "$u" | rg -q '^/servicios/'; then
                echo "$json" | jq -e 'has("@graph")' >/dev/null || { echo "❌ Missing @graph in $u"; FAIL=1; }
              fi
            fi
          done
          [ $FAIL -eq 0 ] || exit 1

      - name: Crear Issue si el check SEO falla
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'seo-automatico';
            const title = '🚨 Falla del check SEO semanal';
            // Dedup: si ya hay un Issue abierto con esta etiqueta, solo comenta.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const fecha = new Date().toLocaleString('es-MX', { timeZone: 'America/Mazatlan' });
            const body = [
              '## El check SEO semanal falló',
              '',
              `**Fecha:** ${fecha}`,
              `**Corrida:** ${runUrl}`,
              '',
              'Uno o más chequeos (GTM, título, meta description, canonical/og:url o JSON-LD)',
              'no pasaron en alguna de las URLs auditadas. Revisa el log de la corrida.',
              '',
              '---',
              '_Generado automáticamente por el Weekly SEO Check_',
            ].join('\n');

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Volvió a fallar el ${fecha}. Corrida: ${runUrl}`,
              });
              core.info(`Issue #${issue.number} ya existe; se agregó comentario.`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', label],
              });
              core.info('Se creó un nuevo Issue de falla SEO.');
            }

      - name: Cerrar Issue SEO si la corrida pasó limpia
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            // Contraparte del dedup: cuando el check vuelve a pasar, el Issue
            // abierto se cierra solo (antes quedaba abierto para siempre
            // acumulando comentarios).
            const label = 'seo-automatico';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const fecha = new Date().toLocaleString('es-MX', { timeZone: 'America/Mazatlan' });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ El check SEO volvió a pasar el ${fecha}. Corrida: ${runUrl}. Se cierra automáticamente.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              core.info(`Issue #${issue.number} cerrado (check en verde).`);
            }

      - name: Summary
        if: always()
        run: echo "SEO weekly check finished."
